<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen POS PRO - 4:3 旗艦優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f8fafc', 100: '#f1f5f9', 500: '#334155', 600: '#1e293b', 700: '#0f172a', 900: '#020617' },
                        accent: { 500: '#3b82f6', 600: '#2563eb' },
                        pay: { 500: '#10b981', 600: '#059669' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #94a3b8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .pos-container { width: 1024px; height: 768px; background: #ffffff; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5); border-radius: 0.75rem; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* 滾動條美化 */
        .hide-scroll::-webkit-scrollbar { width: 6px; }
        .hide-scroll::-webkit-scrollbar-track { background: transparent; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .btn-press:active { transform: scale(0.95); transition: transform 0.05s; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; animation: slideUp 0.2s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .selected-item { background-color: #eff6ff; border-left: 4px solid #3b82f6; }
        
        /* 快捷鍵小標籤 */
        .k-hint { font-size: 10px; position: absolute; top: 2px; right: 4px; color: #94a3b8; font-weight: bold; }
        .active-mode { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
    </style>
</head>
<body class="p-4">

<div class="pos-container">
    <!-- ================= HEADER (優化：增加模式切換與狀態) ================= -->
    <header class="h-14 bg-brand-900 text-white flex items-center justify-between px-4 shrink-0 shadow-lg z-30">
        <div class="flex items-center gap-4">
            <div class="flex flex-col">
                <span class="text-xs text-slate-400 font-bold tracking-tighter">POS TERMINAL v2.5</span>
                <span class="text-xl font-black text-white leading-none">KSORDER</span>
            </div>
            <div class="h-8 w-px bg-slate-700 mx-1"></div>
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm font-medium">連線正常</span>
            </div>
        </div>
        
        <!-- 交易模式指示器 -->
        <div class="flex items-center gap-3">
            <div class="flex bg-slate-800 p-1 rounded-lg">
                <button class="px-4 py-1 rounded bg-slate-700 text-xs font-bold text-white shadow-sm">銷售模式</button>
                <button class="px-4 py-1 rounded text-xs font-bold text-slate-500 hover:text-slate-300">退換貨</button>
            </div>
            <button onclick="openModal('vipModal')" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-1.5 rounded-full text-sm font-black flex items-center gap-2 btn-press shadow-[0_0_15px_rgba(245,158,11,0.3)]">
                <i class="fa-solid fa-crown"></i> 會員查詢 (F5)
            </button>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-right">
                <div class="text-xl font-mono font-bold leading-none tracking-wider" id="clock">14:35:22</div>
                <div class="text-[10px] text-slate-400 font-bold uppercase">2023-10-25 Wed.</div>
            </div>
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-slate-700">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ================= MAIN BODY ================= -->
    <main class="flex-1 flex overflow-hidden bg-slate-100">
        
        <!-- ====== LEFT PANEL: 購物車 (優化：強化價格與選中感) ====== -->
        <section class="w-[400px] bg-white flex flex-col border-r border-slate-200 z-10 shadow-xl">
            <!-- 快速功能按鈕 -->
            <div class="p-3 grid grid-cols-4 gap-2 border-b border-slate-100">
                <button class="bg-slate-50 border border-slate-200 py-3 rounded-xl flex flex-col items-center btn-press hover:bg-red-50 hover:border-red-200 group">
                    <i class="fa-solid fa-trash-can text-slate-400 group-hover:text-red-500 mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-500 group-hover:text-red-600">全清</span>
                </button>
                <button class="bg-slate-50 border border-slate-200 py-3 rounded-xl flex flex-col items-center btn-press hover:bg-amber-50 hover:border-amber-200 group">
                    <i class="fa-solid fa-pause text-slate-400 group-hover:text-amber-500 mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-500 group-hover:text-amber-600">暫存</span>
                </button>
                <button class="bg-slate-50 border border-slate-200 py-3 rounded-xl flex flex-col items-center btn-press hover:bg-blue-50 hover:border-blue-200 group">
                    <i class="fa-solid fa-tags text-slate-400 group-hover:text-blue-500 mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-500 group-hover:text-blue-600">全扣</span>
                </button>
                <button class="bg-slate-50 border border-slate-200 py-3 rounded-xl flex flex-col items-center btn-press hover:bg-slate-100 group">
                    <i class="fa-solid fa-print text-slate-400 group-hover:text-slate-600 mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-500 group-hover:text-slate-600">重印</span>
                </button>
            </div>

            <!-- 購物車清單 -->
            <div class="flex-1 overflow-y-auto hide-scroll bg-slate-50/30">
                <div class="sticky top-0 bg-slate-800 text-white flex px-4 py-2 text-[11px] font-bold z-10">
                    <div class="w-8">#</div>
                    <div class="flex-1">品名 / 規格</div>
                    <div class="w-12 text-center">數量</div>
                    <div class="w-20 text-right">小計</div>
                </div>
                
                <ul class="flex flex-col">
                    <!-- Item 1: Selected -->
                    <li class="flex py-4 px-4 border-b border-slate-100 selected-item transition-colors">
                        <div class="w-8 text-xs font-bold text-blue-500 pt-1">1</div>
                        <div class="flex-1">
                            <div class="text-slate-900 font-black text-base">招牌冰滴咖啡 (大)</div>
                            <div class="flex gap-2 mt-1">
                                <span class="bg-blue-100 text-blue-700 text-[10px] px-1.5 py-0.5 rounded font-bold">冰度固定</span>
                                <span class="text-slate-400 text-xs font-bold">$ 120</span>
                            </div>
                        </div>
                        <div class="w-12 flex flex-col items-center justify-center">
                            <span class="text-xl font-black text-slate-800">2</span>
                            <span class="text-[10px] text-slate-400 font-bold mt-1">變更</span>
                        </div>
                        <div class="w-20 text-right">
                            <span class="text-xl font-black text-slate-900">$ 240</span>
                        </div>
                    </li>
                    
                    <!-- Item 2 -->
                    <li class="flex py-4 px-4 border-b border-slate-100 bg-white hover:bg-slate-50">
                        <div class="w-8 text-xs font-bold text-slate-300 pt-1">2</div>
                        <div class="flex-1">
                            <div class="text-slate-800 font-bold text-base">台灣嚴選椪柑</div>
                            <div class="flex gap-2 mt-1">
                                <span class="bg-rose-50 text-rose-500 text-[10px] px-1.5 py-0.5 rounded font-bold border border-rose-100">特價活動</span>
                                <span class="text-slate-400 text-xs font-bold">$ 45</span>
                            </div>
                        </div>
                        <div class="w-12 text-center text-xl font-black text-slate-800">1</div>
                        <div class="w-20 text-right text-xl font-black text-slate-800">$ 45</div>
                    </li>
                </ul>
            </div>

            <!-- 結算區 (優化：資訊清晰化) -->
            <div class="bg-brand-700 text-white p-5 shadow-[0_-10px_20px_rgba(0,0,0,0.1)]">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-slate-400 text-sm font-bold">總品項: <span class="text-white">2</span> | 總數量: <span class="text-white">3</span></span>
                    <span class="text-slate-400 text-sm">小計: $ 285</span>
                </div>
                <div class="flex justify-between items-center mb-4 text-rose-400">
                    <span class="text-sm font-bold">折扣總計</span>
                    <span class="text-lg font-black">- $ 0</span>
                </div>
                <div class="h-px bg-slate-600 mb-4"></div>
                <div class="flex justify-between items-end">
                    <span class="text-slate-300 font-bold pb-2">應付總額 (TWD)</span>
                    <div class="text-right">
                        <span class="text-5xl font-black text-white tracking-tighter" style="text-shadow: 0 0 20px rgba(59,130,246,0.4);">$ 285</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ====== RIGHT PANEL: 商品與控制 (優化：格線與視覺重心) ====== -->
        <section class="flex-1 flex flex-col">
            
            <!-- 導覽分類 (優化：指示器明顯) -->
            <nav class="bg-white border-b border-slate-200 flex px-2 py-2 gap-2 z-20">
                <button onclick="switchBaseTab('tab-products', this)" class="tab-btn active px-6 py-2.5 rounded-xl bg-slate-800 text-white font-black text-sm shadow-lg btn-press">
                    快捷商品 (F1)
                </button>
                <button onclick="switchBaseTab('tab-delivery', this)" class="tab-btn px-6 py-2.5 rounded-xl bg-white text-slate-500 font-bold text-sm hover:bg-slate-50 btn-press">
                    外送平台 (F2)
                </button>
                <button onclick="switchBaseTab('tab-services', this)" class="tab-btn px-6 py-2.5 rounded-xl bg-white text-slate-500 font-bold text-sm hover:bg-slate-50 btn-press">
                    票券服務 (F3)
                </button>
                <div class="flex-1"></div>
                <button class="bg-brand-100 text-brand-700 px-4 rounded-xl font-bold text-xs flex items-center gap-2">
                    <i class="fa-solid fa-filter"></i> 進階選單
                </button>
            </nav>

            <!-- 內容區 -->
            <div class="flex-1 relative p-3">
                
                <!-- TAB 1: 商品格線 (優化：資訊層次) -->
                <div id="tab-products" class="tab-content active h-full">
                    <div class="grid grid-cols-4 grid-rows-4 gap-3 h-full">
                        <!-- Product Item -->
                        <button class="bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-accent-500 hover:ring-2 hover:ring-accent-100 flex flex-col p-3 relative btn-press group overflow-hidden">
                            <span class="k-hint">1</span>
                            <div class="flex-1 flex items-center justify-center">
                                <div class="w-14 h-14 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-egg"></i>
                                </div>
                            </div>
                            <div class="mt-2 text-center">
                                <span class="block text-sm font-black text-slate-800">茶葉蛋</span>
                                <span class="block text-accent-600 text-xs font-black mt-1">$ 10</span>
                            </div>
                            <div class="absolute bottom-0 left-0 w-full h-1 bg-orange-400 opacity-0 group-hover:opacity-100"></div>
                        </button>
                        
                        <button class="bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-accent-500 flex flex-col p-3 relative btn-press group">
                            <span class="k-hint">2</span>
                            <div class="flex-1 flex items-center justify-center">
                                <div class="w-14 h-14 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-mug-hot"></i>
                                </div>
                            </div>
                            <div class="mt-2 text-center">
                                <span class="block text-sm font-black text-slate-800">熱美式 (中)</span>
                                <span class="block text-accent-600 text-xs font-black mt-1">$ 45</span>
                            </div>
                        </button>

                        <button class="bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-accent-500 flex flex-col p-3 relative btn-press group">
                            <div class="flex-1 flex items-center justify-center">
                                <div class="w-14 h-14 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-leaf"></i>
                                </div>
                            </div>
                            <div class="mt-2 text-center">
                                <span class="block text-sm font-black text-slate-800">當季蔬菜包</span>
                                <span class="block text-accent-600 text-xs font-black mt-1">$ 39</span>
                            </div>
                        </button>

                        <button class="bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center p-3 text-slate-400 hover:bg-white hover:border-accent-500 transition-all">
                            <i class="fa-solid fa-plus text-2xl mb-1"></i>
                            <span class="text-[10px] font-bold">自定義快捷</span>
                        </button>
                        
                        <!-- 更多格線佔位 -->
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                        <div class="bg-slate-50/50 rounded-2xl border border-slate-100"></div>
                    </div>
                </div>

                <!-- 其他分頁略 (保持原樣或依需求增強) -->
                <div id="tab-delivery" class="tab-content h-full">
                    <div class="grid grid-cols-2 gap-4 h-full pt-2">
                        <button class="bg-white rounded-2xl shadow-sm border-2 border-pink-100 hover:border-pink-500 flex flex-col justify-center items-center py-6 btn-press group">
                            <div class="bg-pink-500 text-white w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mb-3 shadow-lg group-hover:-translate-y-2 transition-transform"><i class="fa-solid fa-motorcycle"></i></div>
                            <span class="font-black text-xl text-slate-800">FoodPanda</span>
                            <span class="text-slate-400 text-xs mt-1">訂單匯入結帳</span>
                        </button>
                        <button class="bg-white rounded-2xl shadow-sm border-2 border-green-100 hover:border-green-600 flex flex-col justify-center items-center py-6 btn-press group">
                            <div class="bg-green-600 text-white w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mb-3 shadow-lg group-hover:-translate-y-2 transition-transform"><i class="fa-brands fa-uber"></i></div>
                            <span class="font-black text-xl text-slate-800">UberEats</span>
                            <span class="text-slate-400 text-xs mt-1">訂單匯入結帳</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- ====== BOTTOM AREA: 輸入與操作面板 (優化：重心調整) ====== -->
            <div class="h-[260px] bg-slate-200 p-4 flex gap-4 border-t border-slate-300">
                
                <!-- 數字鍵盤 (優化：加大的 0 與 清除) -->
                <div class="w-[200px] grid grid-cols-3 gap-2">
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">7</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">8</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">9</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">4</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">5</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">6</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">1</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">2</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">3</button>
                    <button class="bg-slate-400 text-white font-black text-lg rounded-xl shadow-sm btn-press">C</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">0</button>
                    <button class="bg-white font-black text-2xl rounded-xl shadow-sm border border-slate-300 hover:bg-slate-50 btn-press">00</button>
                </div>

                <!-- 支付與輸入區 -->
                <div class="flex-1 flex flex-col gap-3">
                    <!-- 條碼輸入列 -->
                    <div class="flex gap-2">
                        <div class="flex-1 h-14 bg-white rounded-xl border-2 border-brand-500 shadow-inner px-4 flex items-center focus-within:ring-4 focus-within:ring-brand-100 transition-all">
                            <i class="fa-solid fa-barcode text-slate-400 text-2xl mr-4"></i>
                            <input type="text" placeholder="刷讀條碼或商品編號..." class="flex-1 text-2xl font-black text-slate-800 outline-none" id="barcodeInput">
                        </div>
                        <button class="w-20 bg-brand-600 text-white rounded-xl font-black text-lg btn-press">OK</button>
                    </div>

                    <!-- 支付按鈕群 (優化：主要操作區塊) -->
                    <div class="flex-1 grid grid-cols-4 gap-3">
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-solid fa-qrcode text-slate-400 text-2xl mb-1 group-hover:text-accent-500"></i>
                            <span class="text-xs font-black text-slate-600">載具/統編</span>
                        </button>
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-solid fa-wallet text-amber-500 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-xs font-black text-slate-600">儲值支付</span>
                        </button>
                        <!-- 現金按鈕：強烈色 -->
                        <button onclick="openModal('paymentModal')" class="bg-pay-500 text-white rounded-2xl flex flex-col items-center justify-center btn-press shadow-lg border-b-4 border-pay-700 hover:bg-pay-600">
                            <i class="fa-solid fa-money-bill-wave text-3xl mb-1"></i>
                            <span class="text-sm font-black italic">CASH</span>
                            <span class="text-[10px] font-bold opacity-80">現金付款</span>
                        </button>
                        <!-- 小計按鈕：主視覺中心 -->
                        <button class="row-span-1 bg-accent-600 text-white rounded-2xl flex flex-col items-center justify-center btn-press shadow-lg border-b-4 border-accent-800 hover:bg-accent-700">
                            <span class="text-[10px] font-black opacity-80 uppercase tracking-widest">Subtotal</span>
                            <span class="text-3xl font-black">結帳</span>
                        </button>
                        
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-brands fa-apple text-slate-800 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-xs font-black text-slate-600">行動支付</span>
                        </button>
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-solid fa-credit-card text-blue-500 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-xs font-black text-slate-600">信用卡</span>
                        </button>
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-solid fa-gift text-rose-500 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-xs font-black text-slate-600">禮券票券</span>
                        </button>
                        <button class="bg-slate-700 text-white rounded-2xl flex flex-col items-center justify-center btn-press group">
                            <i class="fa-solid fa-gear text-slate-400 text-xl mb-1"></i>
                            <span class="text-[10px] font-black">更多功能</span>
                        </button>
                    </div>
                </div>

            </div>

        </section>
    </main>
</div>

<!-- ================= MODALS (優化：快速面額按鈕) ================= -->

<div id="paymentModal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4">
    <div class="bg-white w-[540px] rounded-3xl shadow-2xl overflow-hidden animate-slideUp">
        <div class="bg-pay-600 text-white px-6 py-4 flex justify-between items-center">
            <h3 class="font-black text-xl tracking-wide"><i class="fa-solid fa-cash-register mr-3"></i>現金結帳確認</h3>
            <button onclick="closeModal('paymentModal')" class="w-10 h-10 hover:bg-white/20 rounded-full flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="p-8 flex flex-col gap-6">
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <span class="text-slate-500 font-black">應收金額</span>
                <span class="text-4xl font-black text-slate-900">$ 285</span>
            </div>
            
            <div class="flex flex-col gap-3">
                <span class="text-sm font-black text-slate-400 px-1">實收現金 (輸入或選擇快捷)</span>
                <div class="relative">
                    <input type="text" class="w-full text-5xl font-black text-right p-5 bg-white border-2 border-pay-500 rounded-2xl outline-none text-pay-600 focus:ring-4 focus:ring-pay-100" value="1000">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-pay-300 text-2xl font-black">TWD</span>
                </div>
                
                <!-- 快速面額優化 -->
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button class="py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-black text-slate-600 btn-press">正好</button>
                    <button class="py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-black text-slate-600 btn-press">500</button>
                    <button class="py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-black text-slate-600 btn-press">1000</button>
                    <button class="py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-black text-slate-600 btn-press">2000</button>
                </div>
            </div>

            <div class="h-px bg-slate-100"></div>

            <div class="flex justify-between items-end">
                <span class="text-slate-500 font-black text-lg">找零</span>
                <span class="text-5xl font-black text-rose-500" id="changeAmount">$ 715</span>
            </div>
        </div>
        
        <div class="p-6 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-4">
            <button onclick="closeModal('paymentModal')" class="py-4 bg-slate-200 text-slate-600 font-black rounded-2xl hover:bg-slate-300 btn-press">返回 (ESC)</button>
            <button onclick="confirmPayment()" class="py-4 bg-pay-500 text-white font-black rounded-2xl hover:bg-pay-600 shadow-lg border-b-4 border-pay-700 btn-press text-xl">確認收錢 (ENTER)</button>
        </div>
    </div>
</div>

<!-- VIP 查詢 (保持簡潔但美化) -->
<div id="vipModal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center">
    <div class="bg-white w-[420px] rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-amber-500 text-white px-6 py-4 flex justify-between">
            <h3 class="font-black text-lg"><i class="fa-solid fa-crown mr-2"></i>會員查詢 / 綁定</h3>
            <button onclick="closeModal('vipModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="p-6">
            <input type="text" placeholder="輸入手機號碼 / 卡號" class="w-full text-3xl font-black border-2 border-amber-300 rounded-2xl p-4 outline-none text-center focus:ring-4 focus:ring-amber-50">
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button class="bg-slate-100 py-3 rounded-xl font-bold">手機掃碼</button>
                <button class="bg-slate-100 py-3 rounded-xl font-bold">實體卡</button>
            </div>
        </div>
        <div class="p-4 bg-slate-50 flex gap-2">
            <button onclick="closeModal('vipModal')" class="flex-1 py-3 bg-slate-200 rounded-xl font-bold">取消</button>
            <button onclick="closeModal('vipModal')" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold">查詢</button>
        </div>
    </div>
</div>

<script>
    // JS Logic for Tabs
    function switchBaseTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('nav .tab-btn').forEach(btn => {
            btn.classList.remove('active', 'bg-slate-800', 'text-white', 'shadow-lg');
            btn.classList.add('bg-white', 'text-slate-500');
        });
        
        document.getElementById(tabId).classList.add('active');
        el.classList.remove('bg-white', 'text-slate-500');
        el.classList.add('active', 'bg-slate-800', 'text-white', 'shadow-lg');
        document.getElementById('barcodeInput').focus();
    }

    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Modals
    function openModal(id) {
        const modal = document.getElementById(id);
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    function closeModal(id) {
        const modal = document.getElementById(id);
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.getElementById('barcodeInput').focus();
    }
    
    function confirmPayment() {
        closeModal('paymentModal');
        // 模擬一個完成的反饋
        const btn = document.querySelector('.bg-accent-600');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check text-3xl"></i><span class="text-sm font-bold">交易完成</span>';
        btn.classList.replace('bg-accent-600', 'bg-green-600');
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.replace('bg-green-600', 'bg-accent-600');
        }, 2000);
    }

    // Auto-focus barcode
    document.addEventListener('keydown', (e) => {
        const anyModalActive = !document.getElementById('paymentModal').classList.contains('hidden') || 
                               !document.getElementById('vipModal').classList.contains('hidden');
        if (!anyModalActive && e.key.length === 1) {
            document.getElementById('barcodeInput').focus();
        }
        // 快捷鍵模擬
        if (e.key === 'F1') switchBaseTab('tab-products', document.querySelector('nav .tab-btn'));
        if (e.key === 'F5') openModal('vipModal');
    });
</script>

</body>
</html>
