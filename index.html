<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen POS Pro v3.0 - 4:3 穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#1e293b', 600: '#0f172a', 700: '#020617' },
                        accent: { 500: '#3b82f6', 600: '#2563eb' },
                        success: { 500: '#10b981', 600: '#059669' },
                        danger: { 500: '#ef4444', 600: '#dc2626' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #475569; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* 硬性鎖定 4:3 解析度容器 */
        .pos-frame { 
            width: 1024px; 
            height: 768px; 
            background: #ffffff; 
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* 滾動條美化 */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 防文字換行撐開 */
        .text-truncate-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .text-truncate-2 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .btn-press:active { transform: scale(0.96); }
        .modal { display: none; position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

<div class="pos-frame">
    <!-- ================= TOP HEADER (H: 56px) ================= -->
    <header class="h-14 bg-brand-600 text-white flex items-center justify-between px-4 shrink-0 shadow-md">
        <div class="flex items-center gap-4">
            <div class="border-r border-slate-700 pr-4">
                <h1 class="text-xl font-black tracking-tighter">KS-SYSTEM <span class="text-accent-500">PRO</span></h1>
            </div>
            <div class="flex items-center gap-2 text-sm bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <i class="fa-solid fa-store text-accent-500"></i>
                <span class="font-bold">中山旗艦店 - 01機</span>
            </div>
        </div>

        <!-- 狀態與時鐘 -->
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 bg-slate-800/50 px-4 py-1.5 rounded-lg">
                <i class="fa-solid fa-user-tie text-slate-400"></i>
                <span class="text-sm font-bold">店長 王曉明</span>
            </div>
            <div class="text-right leading-none">
                <div id="clock" class="text-xl font-mono font-bold">12:00:00</div>
                <div id="date" class="text-[10px] text-slate-400 font-bold uppercase mt-1">2023-10-25 WED</div>
            </div>
        </div>
    </header>

    <!-- ================= MAIN BODY ================= -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- ====== LEFT: SHOPPING CART (380px) ====== -->
        <section class="w-[380px] flex flex-col bg-slate-50 border-r border-slate-200 shadow-sm relative z-10">
            <!-- 購物車工具列 -->
            <div class="p-2 grid grid-cols-4 gap-1 border-b border-slate-200">
                <button class="flex flex-col items-center justify-center py-2 rounded bg-white border border-slate-300 btn-press group hover:bg-red-50 hover:border-red-200">
                    <i class="fa-solid fa-trash-can text-slate-400 group-hover:text-red-500 text-sm"></i>
                    <span class="text-[10px] font-bold text-slate-500 mt-1">全清</span>
                </button>
                <button class="flex flex-col items-center justify-center py-2 rounded bg-white border border-slate-300 btn-press group hover:bg-amber-50 hover:border-amber-200">
                    <i class="fa-solid fa-pause text-slate-400 group-hover:text-amber-500 text-sm"></i>
                    <span class="text-[10px] font-bold text-slate-500 mt-1">掛帳</span>
                </button>
                <button class="flex flex-col items-center justify-center py-2 rounded bg-white border border-slate-300 btn-press group hover:bg-blue-50 hover:border-blue-200">
                    <i class="fa-solid fa-tag text-slate-400 group-hover:text-blue-500 text-sm"></i>
                    <span class="text-[10px] font-bold text-slate-500 mt-1">折扣</span>
                </button>
                <button class="flex flex-col items-center justify-center py-2 rounded bg-white border border-slate-300 btn-press group hover:bg-slate-100">
                    <i class="fa-solid fa-clock-rotate-left text-slate-400 group-hover:text-slate-700 text-sm"></i>
                    <span class="text-[10px] font-bold text-slate-500 mt-1">紀錄</span>
                </button>
            </div>

            <!-- 購物車表頭 -->
            <div class="flex px-3 py-2 bg-brand-500 text-white text-[11px] font-bold">
                <div class="w-8 text-center">序</div>
                <div class="flex-1 px-2">品名/規格</div>
                <div class="w-12 text-center">數量</div>
                <div class="w-20 text-right">小計</div>
            </div>

            <!-- 購物車品項列表 (滾動區) -->
            <div class="flex-1 overflow-y-auto custom-scroll bg-white">
                <ul id="cartList" class="flex flex-col">
                    <!-- Item Template -->
                    <li class="flex items-center px-3 py-3 border-b border-slate-100 bg-blue-50/30 border-l-4 border-l-accent-500">
                        <div class="w-8 text-center text-xs font-bold text-blue-500">01</div>
                        <div class="flex-1 px-2 min-w-0">
                            <h4 class="text-sm font-black text-slate-800 text-truncate-1">招牌特濃冰滴咖啡 (大)</h4>
                            <div class="flex gap-1 mt-1">
                                <span class="px-1 py-0.5 bg-slate-200 text-[9px] font-bold rounded text-slate-600">去冰</span>
                                <span class="px-1 py-0.5 bg-slate-200 text-[9px] font-bold rounded text-slate-600">無糖</span>
                            </div>
                        </div>
                        <div class="w-12 text-center">
                            <span class="text-lg font-black text-slate-800">2</span>
                        </div>
                        <div class="w-20 text-right">
                            <span class="text-lg font-black text-slate-900">$ 240</span>
                        </div>
                    </li>

                    <li class="flex items-center px-3 py-3 border-b border-slate-100 bg-white">
                        <div class="w-8 text-center text-xs font-bold text-slate-400">02</div>
                        <div class="flex-1 px-2 min-w-0 text-slate-700">
                            <h4 class="text-sm font-bold text-truncate-1">台灣嚴選椪柑 (箱) 季節限定商品</h4>
                            <p class="text-[10px] text-rose-500 font-bold mt-1"><i class="fa-solid fa-star mr-1"></i>活動特價</p>
                        </div>
                        <div class="w-12 text-center text-lg font-bold">1</div>
                        <div class="w-20 text-right text-lg font-bold">$ 550</div>
                    </li>
                </ul>
            </div>

            <!-- 購物車底欄 (金額總計) -->
            <div class="bg-brand-600 text-white p-5 shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.1)]">
                <div class="flex justify-between items-center text-xs text-slate-400 font-bold mb-1">
                    <span>數量總計: <span class="text-white">3</span> 件</span>
                    <span>稅額 (5%): $ 40</span>
                </div>
                <div class="flex justify-between items-center text-sm font-bold text-rose-400 mb-3">
                    <span>折扣減免</span>
                    <span>- $ 0</span>
                </div>
                <div class="border-t border-slate-700 my-3"></div>
                <div class="flex justify-between items-end">
                    <span class="text-lg font-black pb-1">應收總額</span>
                    <div class="text-right">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1 leading-none">Amount Due</span>
                        <span id="grandTotal" class="text-5xl font-black text-success-500 tracking-tighter">$ 790</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ====== RIGHT: ACTION PANEL (Flexible) ====== -->
        <section class="flex-1 flex flex-col bg-slate-100 overflow-hidden">
            
            <!-- 分類導航 (Fixed H) -->
            <nav class="bg-white border-b border-slate-200 px-3 py-2 flex gap-2 shrink-0 overflow-hidden">
                <button class="px-6 py-2.5 bg-brand-600 text-white rounded-xl font-black text-sm shadow-lg btn-press">快捷商品 (F1)</button>
                <button class="px-6 py-2.5 bg-white text-slate-500 border border-slate-200 rounded-xl font-bold text-sm hover:bg-slate-50 btn-press">外送網購 (F2)</button>
                <button class="px-6 py-2.5 bg-white text-slate-500 border border-slate-200 rounded-xl font-bold text-sm hover:bg-slate-50 btn-press">加值服務 (F3)</button>
            </nav>

            <!-- 商品方格 (可滾動) -->
            <div class="flex-1 p-3 overflow-y-auto custom-scroll">
                <div class="grid grid-cols-4 gap-3">
                    <!-- Product Button -->
                    <button class="bg-white rounded-2xl border-2 border-transparent hover:border-accent-500 shadow-sm p-3 flex flex-col items-center transition-all btn-press group overflow-hidden">
                        <div class="w-16 h-16 rounded-3xl bg-orange-100 text-orange-500 flex items-center justify-center text-3xl mb-2 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-egg"></i>
                        </div>
                        <span class="text-sm font-black text-slate-800 text-truncate-1 w-full text-center">茶葉蛋</span>
                        <span class="text-accent-600 text-xs font-black mt-1">$ 10</span>
                    </button>
                    <!-- Placeholder buttons -->
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32 flex flex-col items-center justify-center text-slate-400 text-xs font-bold">
                        <i class="fa-solid fa-plus mb-2 text-xl"></i>自訂快捷
                    </div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                    <div class="bg-slate-50 rounded-2xl border border-dashed border-slate-300 h-32"></div>
                </div>
            </div>

            <!-- ====== BOTTOM COMMAND CENTER (Fixed H: 300px) ====== -->
            <div class="h-[300px] bg-slate-200 p-4 flex gap-4 border-t border-slate-300 shadow-2xl relative z-20">
                
                <!-- 1. 數字鍵盤 (230px) -->
                <div class="w-[230px] grid grid-cols-3 gap-2 shrink-0">
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">7</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">8</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">9</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">4</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">5</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">6</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">1</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">2</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press active:bg-slate-100">3</button>
                    <button class="bg-slate-400 text-white font-black text-xl rounded-xl shadow-sm btn-press">CLR</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press">0</button>
                    <button class="bg-white font-black text-2xl rounded-xl border border-slate-300 shadow-sm btn-press">00</button>
                </div>

                <!-- 2. 支付面板與輸入 (Flexible) -->
                <div class="flex-1 flex flex-col gap-3">
                    <!-- Barcode Input Row -->
                    <div class="flex gap-2">
                        <div class="flex-1 h-14 bg-white rounded-xl border-2 border-brand-500 shadow-inner px-4 flex items-center focus-within:ring-4 focus-within:ring-accent-100 transition-all">
                            <i class="fa-solid fa-barcode text-slate-400 text-2xl mr-4"></i>
                            <input type="text" placeholder="刷讀條碼或輸入編號..." class="flex-1 text-2xl font-black text-slate-800 outline-none w-full" id="mainInput">
                        </div>
                        <button class="w-24 h-14 bg-brand-600 text-white rounded-xl font-black text-lg btn-press shadow-md">ENTER</button>
                    </div>

                    <!-- Payment Button Matrix -->
                    <div class="flex-1 grid grid-cols-4 grid-rows-2 gap-2">
                        <!-- 第一排 -->
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group shadow-sm">
                            <i class="fa-solid fa-qrcode text-slate-500 text-2xl mb-1 group-hover:text-accent-500"></i>
                            <span class="text-[11px] font-black text-slate-600">載具 / 統編</span>
                        </button>
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group shadow-sm">
                            <i class="fa-solid fa-credit-card text-blue-500 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-[11px] font-black text-slate-600">信用卡</span>
                        </button>
                        <!-- 重點結帳按鈕 (跨行) -->
                        <button onclick="openModal('cashModal')" class="row-span-2 bg-success-500 text-white rounded-2xl flex flex-col items-center justify-center btn-press shadow-xl border-b-4 border-success-700 hover:bg-success-600">
                            <i class="fa-solid fa-money-bill-wave text-4xl mb-2"></i>
                            <span class="text-xl font-black italic">CASH</span>
                            <span class="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-widest">現金結帳</span>
                        </button>
                        <button onclick="openModal('paymentModal')" class="row-span-2 bg-accent-600 text-white rounded-2xl flex flex-col items-center justify-center btn-press shadow-xl border-b-4 border-accent-800 hover:bg-accent-700">
                            <i class="fa-solid fa-calculator text-4xl mb-2"></i>
                            <span class="text-xl font-black uppercase tracking-widest">結帳</span>
                            <span class="text-[10px] bg-white/20 px-2 py-0.5 rounded-full mt-1">F12</span>
                        </button>
                        
                        <!-- 第二排 -->
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group shadow-sm">
                            <i class="fa-brands fa-apple text-slate-800 text-2xl mb-1 group-hover:scale-110 transition-transform"></i>
                            <span class="text-[11px] font-black text-slate-600">行動支付</span>
                        </button>
                        <button class="bg-white border border-slate-300 rounded-2xl flex flex-col items-center justify-center btn-press group shadow-sm">
                            <i class="fa-solid fa-wallet text-amber-500 text-2xl mb-1 group-hover:scale-110"></i>
                            <span class="text-[11px] font-black text-slate-600">儲值支付</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<!-- ================= MODALS ================= -->

<!-- 1. 現金結帳視窗 -->
<div id="cashModal" class="modal">
    <div class="bg-white w-[500px] rounded-3xl shadow-2xl overflow-hidden animate-bounce-in">
        <div class="bg-success-600 text-white px-6 py-4 flex justify-between items-center">
            <h3 class="font-black text-xl"><i class="fa-solid fa-cash-register mr-3"></i>收銀確認</h3>
            <button onclick="closeModal('cashModal')"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-8 flex flex-col gap-6">
            <div class="flex justify-between items-center bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <span class="text-slate-500 font-black text-lg">應收金額</span>
                <span class="text-5xl font-black text-slate-900">$ 790</span>
            </div>
            <div class="flex flex-col gap-2">
                <span class="text-sm font-black text-slate-400 px-1 uppercase tracking-widest">實收現金</span>
                <input type="text" value="1000" class="w-full text-5xl font-black text-right p-5 bg-white border-2 border-success-500 rounded-2xl outline-none text-success-600 focus:ring-4 focus:ring-success-50">
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button class="py-3 bg-slate-100 font-bold rounded-xl btn-press">正好</button>
                    <button class="py-3 bg-slate-100 font-bold rounded-xl btn-press">500</button>
                    <button class="py-3 bg-slate-100 font-bold rounded-xl btn-press">1000</button>
                    <button class="py-3 bg-slate-100 font-bold rounded-xl btn-press">2000</button>
                </div>
            </div>
            <div class="h-px bg-slate-100"></div>
            <div class="flex justify-between items-end">
                <span class="text-slate-500 font-black text-lg">找零</span>
                <span class="text-5xl font-black text-danger-500">$ 210</span>
            </div>
        </div>
        <div class="p-6 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-4">
            <button onclick="closeModal('cashModal')" class="py-4 bg-slate-200 text-slate-600 font-black rounded-2xl btn-press">取消 (ESC)</button>
            <button onclick="closeModal('cashModal')" class="py-4 bg-success-500 text-white font-black rounded-2xl shadow-lg border-b-4 border-success-700 btn-press text-xl">確認付款 (ENTER)</button>
        </div>
    </div>
</div>

<script>
    // JS Logic for Clock
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'short', year: 'numeric', month: '2-digit', day: '2-digit' };
        document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        document.getElementById('date').textContent = now.toLocaleDateString('en-US', options).toUpperCase();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Modal Control
    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }
    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
        document.getElementById('mainInput').focus();
    }

    // Auto focus barcode input
    window.onload = () => {
        document.getElementById('mainInput').focus();
    };

    // Global Key Events
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') openModal('cashModal');
        if (e.key === 'Escape') closeModal('cashModal');
    });
</script>

</body>
</html>
